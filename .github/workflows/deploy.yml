name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22.12'
          cache: 'npm'
      - run: npm ci
      - run: npm test
      - run: npx astro check
      - run: npm run build
      - name: Validate Cloudflare API token
        run: |
          TOKEN="${{ secrets.CLOUDFLARE_API_TOKEN }}"
          echo "Token length: ${#TOKEN}"
          echo "--- Account check ---"
          curl -s -H "Authorization: Bearer $TOKEN" "https://api.cloudflare.com/client/v4/accounts" | python3 -m json.tool 2>/dev/null || curl -s -H "Authorization: Bearer $TOKEN" "https://api.cloudflare.com/client/v4/accounts"
          echo ""
          echo "--- Token permissions ---"
          curl -s -H "Authorization: Bearer $TOKEN" "https://api.cloudflare.com/client/v4/user/tokens/verify" | python3 -c "
          import json, sys
          data = json.load(sys.stdin)
          result = data.get('result', {})
          print('Token id:', result.get('id'))
          print('Status:', result.get('status'))
          for p in result.get('policies', []):
              print(f'  Policy: {p.get(\"effect\")} {p.get(\"permission_groups\",[])} on {p.get(\"resources\",{})}')
          for p in result.get('permission_groups', []):
              print(f'  Perm: {p.get(\"name\",\"?\")} ({p.get(\"id\",\"?\")})')
          " 2>/dev/null || echo "Failed to parse permissions"
          echo ""
          echo "--- CLOUDFLARE_ACCOUNT_ID ---"
          echo "Length: $(echo -n '${{ secrets.CLOUDFLARE_ACCOUNT_ID }}' | wc -c)"
          echo "First 4: $(echo '${{ secrets.CLOUDFLARE_ACCOUNT_ID }}' | cut -c1-4)"
          echo "Last 4: $(echo '${{ secrets.CLOUDFLARE_ACCOUNT_ID }}' | rev | cut -c1-4 | rev)"
      - run: npx wrangler deploy --config dist/server/wrangler.json
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      - run: npm run indexnow
        continue-on-error: true
